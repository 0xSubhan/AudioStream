name: Build Android APK

on:
  push:
    tags:
      - 'v*.*.*'
    paths:
      - 'android_app/**'
      - '.github/workflows/build-android.yml'
  workflow_dispatch:

# Allow the token to upload to GitHub Releases
permissions:
  contents: write

jobs:
  build-android:
    name: Build app-release.apk (Android)
    runs-on: ubuntu-22.04

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Java 17 (required by Gradle / Android SDK) ────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Set up Flutter ─────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      # ── 4. Accept Android SDK licenses ───────────────────────────
      - name: Accept Android SDK licenses
        run: yes | flutter doctor --android-licenses || true

      # ── 5. Install Flutter dependencies ──────────────────────────
      - name: Flutter pub get
        run: flutter pub get
        working-directory: android_app

      # ── 6. Build release APK ──────────────────────────────────────
      - name: Build release APK
        run: flutter build apk --release
        working-directory: android_app

      # ── 7. Rename APK to a clean filename ─────────────────────────
      - name: Rename APK
        run: |
          cp android_app/build/app/outputs/flutter-apk/app-release.apk app-release.apk
          echo "APK size: $(du -sh app-release.apk | cut -f1)"

      # ── 8. Upload as workflow artifact ───────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: AudioStream-Android
          path: app-release.apk
          retention-days: 30

      # ── 9. Attach to GitHub Release ───────────────────────────────
      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
