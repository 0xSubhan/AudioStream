name: Build Android APK

on:
  push:
    tags:
      - 'v*.*.*'
    paths:
      - 'android_app/**'
      - '.github/workflows/build-android.yml'
  workflow_dispatch:

# Allow the token to upload to GitHub Releases
permissions:
  contents: write

jobs:
  build-android:
    name: Build app-release.apk (Android)
    runs-on: ubuntu-22.04

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Java 17 (required by Gradle / Android SDK) ────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Set up Flutter ─────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      # ── 4. Accept Android SDK licenses ───────────────────────────
      - name: Accept Android SDK licenses
        run: yes | flutter doctor --android-licenses || true

      # ── 5. Set up release keystore ────────────────────────────────
      # If the KEYSTORE_BASE64 secret is set, decode it and configure
      # env vars so Gradle picks it up for a proper release signature.
      # If the secret is missing (forks / first-time setup), the build
      # falls back to the debug key automatically (see build.gradle.kts).
      - name: Set up release keystore
        id: keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS_VAL: ${{ secrets.KEY_ALIAS }}
          KEY_PASS: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "Using release keystore from secret"
            echo "$KEYSTORE_BASE64" | base64 --decode > $RUNNER_TEMP/release.jks
            echo "KEYSTORE_FILE=$RUNNER_TEMP/release.jks"  >> $GITHUB_ENV
            echo "KEYSTORE_PASSWORD=$STORE_PASSWORD"        >> $GITHUB_ENV
            echo "KEY_ALIAS=$KEY_ALIAS_VAL"                >> $GITHUB_ENV
            echo "KEY_PASSWORD=$KEY_PASS"                  >> $GITHUB_ENV
          else
            echo "KEYSTORE_BASE64 secret not set – building with debug key (CI-generated keystore will not be distributable but pipeline won't fail)"
          fi

      # ── 6. Install Flutter dependencies ──────────────────────────
      - name: Flutter pub get
        run: flutter pub get
        working-directory: android_app

      # ── 7. Build universal release APK ───────────────────────────
      - name: Build release APK (universal)
        run: flutter build apk --release
        working-directory: android_app

      # ── 8. Build per-ABI split APKs (smaller, install faster) ────
      - name: Build release APKs (split per ABI)
        run: flutter build apk --release --split-per-abi
        working-directory: android_app

      # ── 9. Collect & rename artifacts ────────────────────────────
      - name: Collect APKs
        run: |
          mkdir -p dist
          # Universal fat APK
          cp android_app/build/app/outputs/flutter-apk/app-release.apk \
             dist/AudioStream-universal.apk

          # Per-ABI splits (arm64 is what most modern phones need)
          for abi in arm64-v8a armeabi-v7a x86_64; do
            SRC="android_app/build/app/outputs/flutter-apk/app-${abi}-release.apk"
            if [ -f "$SRC" ]; then
              cp "$SRC" "dist/AudioStream-${abi}.apk"
            fi
          done

          echo "── Built APKs ──────────────────────────────"
          ls -lh dist/

      # ── 10. Upload all APKs as workflow artifact ──────────────────
      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AudioStream-Android
          path: dist/
          retention-days: 30

      # ── 11. Attach to GitHub Release ──────────────────────────────
      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
