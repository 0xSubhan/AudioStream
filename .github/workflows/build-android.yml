name: Build Android APK

on:
  push:
    # Tags always trigger a release build (no path filter)
    tags:
      - 'v*.*.*'
  workflow_dispatch:

# Allow the token to upload to GitHub Releases
permissions:
  contents: write

jobs:
  build-android:
    name: Build app-release.apk (Android)
    runs-on: ubuntu-22.04

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Java 17 (required by Gradle / Android SDK) ────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Set up Flutter ─────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      # ── 4. Accept Android SDK licenses ───────────────────────────
      - name: Accept Android SDK licenses
        run: yes | flutter doctor --android-licenses || true

      # ── 5. Write key.properties + decode keystore ─────────────────
      # Uses the standard Flutter key.properties signing approach.
      # On a tag push we REQUIRE the secrets to be set — the build will
      # fail here rather than silently producing a debug-signed APK that
      # Android phones refuse to install over a release-signed version.
      - name: Set up release keystore
        env:
          KEYSTORE_BASE64:   ${{ secrets.KEYSTORE_BASE64 }}
          STORE_PASSWORD:    ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS_VAL:     ${{ secrets.KEY_ALIAS }}
          KEY_PASS:          ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "✅ Release keystore secret found — using release signing"
            KEYSTORE_PATH="$RUNNER_TEMP/release.jks"
            echo "$KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"

            # Write the canonical key.properties file that build.gradle.kts reads
            cat > android_app/android/key.properties <<EOF
          storeFile=$KEYSTORE_PATH
          storePassword=$STORE_PASSWORD
          keyAlias=$KEY_ALIAS_VAL
          keyPassword=$KEY_PASS
          EOF

            echo "key.properties written:"
            cat android_app/android/key.properties
          else
            if [[ "$GITHUB_REF" == refs/tags/* ]]; then
              echo "❌ KEYSTORE_BASE64 secret is not set but this is a tag release build."
              echo "   Add the four secrets to your repository:"
              echo "   KEYSTORE_BASE64, KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD"
              exit 1
            else
              echo "⚠️  KEYSTORE_BASE64 not set — building with debug key (workflow_dispatch only)"
            fi
          fi

      # ── 6. Install Flutter dependencies ──────────────────────────
      - name: Flutter pub get
        run: flutter pub get
        working-directory: android_app

      # ── 7. Build per-ABI split APKs ──────────────────────────────
      - name: Build release APKs (split per ABI)
        run: flutter build apk --release --split-per-abi
        working-directory: android_app

      # ── 8. Build universal fat APK ───────────────────────────────
      - name: Build release APK (universal / fat)
        run: flutter build apk --release
        working-directory: android_app

      # ── 9. Collect & rename artifacts ────────────────────────────
      - name: Collect APKs
        run: |
          mkdir -p dist

          # Universal fat APK (all ABIs in one file — safe fallback)
          cp android_app/build/app/outputs/flutter-apk/app-release.apk \
             dist/AudioStream-universal.apk

          # Per-ABI splits (arm64-v8a is what most modern phones need)
          for abi in arm64-v8a armeabi-v7a x86_64; do
            SRC="android_app/build/app/outputs/flutter-apk/app-${abi}-release.apk"
            if [ -f "$SRC" ]; then
              cp "$SRC" "dist/AudioStream-${abi}.apk"
            fi
          done

          echo "── Built APKs ──────────────────────────────"
          ls -lh dist/

      # ── 10. Upload all APKs as workflow artifact ──────────────────
      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AudioStream-Android
          path: dist/
          retention-days: 30

      # ── 11. Attach to GitHub Release ──────────────────────────────
      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
