name: Build Linux Binary

on:
  push:
    tags:
      - 'v*.*.*'
    paths:
      - 'core/**'
      - 'pc_app/**'
      - 'CMakeLists.txt'
      - '.github/workflows/build-linux.yml'
  workflow_dispatch:

# Allow the token to create GitHub Releases and upload assets
permissions:
  contents: write

jobs:
  build-linux:
    name: Build AudioStream (Linux x64)
    runs-on: ubuntu-22.04

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python 3.12 first (must be before system deps) ─
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ── 3. Install system dependencies ───────────────────────────
      #    Note: NO python3-dev here — we use the Python from setup-python above.
      #    The actions/setup-python runner already provides the dev headers.
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake gcc g++ \
            libpulse-dev libopus-dev \
            upx-ucl

      # ── 4. Install Python packages (pybind11 BEFORE cmake) ───────
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pybind11 pyinstaller
          pip install -r pc_app/requirements.txt

      # ── 5. Configure CMake ────────────────────────────────────────
      #    Point CMake at the Python from setup-python, not system Python
      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=OFF \
            -DPython3_EXECUTABLE=$(which python)

      # ── 6. Build C++ engine ───────────────────────────────────────
      - name: Build C++ engine
        run: cmake --build build --config Release --parallel $(nproc)

      # ── 7. Verify .so was produced ────────────────────────────────
      - name: Verify audiostream_core.so
        run: |
          SO=$(ls pc_app/audiostream_core*.so 2>/dev/null | head -1)
          if [ -z "$SO" ]; then
            echo "ERROR: audiostream_core*.so not found"
            exit 1
          fi
          echo "Found: $SO"

      # ── 8. Bundle with PyInstaller ────────────────────────────────
      - name: Bundle AudioStream binary with PyInstaller
        run: |
          cd pc_app
          pyinstaller AudioStream.spec \
            --distpath ../dist \
            --workpath ../build/pyinstaller_work \
            --noconfirm

      # ── 9. Verify binary ─────────────────────────────────────────
      - name: Verify binary
        run: |
          if [ ! -f "dist/AudioStream" ]; then
            echo "ERROR: AudioStream binary not found"
            exit 1
          fi
          chmod +x dist/AudioStream
          echo "Size: $(du -sh dist/AudioStream | cut -f1)"

      # ── 10. Upload artifact ───────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AudioStream-Linux-x64
          path: dist/AudioStream
          retention-days: 30

      # ── 11. Attach to GitHub Release ─────────────────────────────
      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/AudioStream
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
