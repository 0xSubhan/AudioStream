name: Build Windows EXE

on:
  push:
    tags:
      - 'v*.*.*'
    paths:
      - 'core/**'
      - 'pc_app/**'
      - 'CMakeLists.txt'
      - '.github/workflows/build-windows.yml'
  workflow_dispatch:

# Allow the token to create GitHub Releases and upload assets
permissions:
  contents: write

jobs:
  build-windows:
    name: Build AudioStream.exe (Windows x64)
    runs-on: windows-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python 3.12 ────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ── 3. Install Python packages (pybind11 BEFORE cmake) ───────
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pybind11 pyinstaller pillow
          pip install -r pc_app/requirements.txt

      # ── 4. Install Opus via vcpkg ─────────────────────────────────
      #    On windows-latest, vcpkg is pre-installed and on PATH
      - name: Install Opus via vcpkg
        run: vcpkg install opus:x64-windows
        shell: pwsh

      # ── 5. Configure CMake ────────────────────────────────────────
      - name: Configure CMake
        run: |
          $pyexe = (Get-Command python).Source
          cmake -B build `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows `
            -DPython3_EXECUTABLE="$pyexe" `
            -A x64
        shell: pwsh

      # ── 6. Build C++ engine ───────────────────────────────────────
      - name: Build C++ engine
        run: cmake --build build --config Release --parallel
        shell: pwsh

      # ── 7. Verify .pyd was produced ──────────────────────────────
      - name: Verify audiostream_core.pyd
        run: |
          $pyd = Get-ChildItem -Path pc_app -Filter "audiostream_core*.pyd" | Select-Object -First 1
          if (-not $pyd) {
            Write-Error "audiostream_core*.pyd not found in pc_app\"
            exit 1
          }
          Write-Host "Found: $($pyd.FullName)"
        shell: pwsh

      # ── 8. Convert icon PNG → ICO (non-fatal) ────────────────────
      - name: Generate Windows icon
        run: |
          New-Item -ItemType Directory -Path assets -Force | Out-Null
          python -c "from PIL import Image; img=Image.open('android_app/assets/icon.png'); img.save('assets/icon.ico', format='ICO', sizes=[(256,256),(128,128),(64,64),(32,32),(16,16)]); print('icon.ico OK')"
        shell: pwsh
        continue-on-error: true

      # ── 9. Bundle with PyInstaller ────────────────────────────────
      - name: Bundle AudioStream.exe with PyInstaller
        run: |
          Set-Location pc_app
          pyinstaller AudioStream.spec `
            --distpath ..\dist `
            --workpath ..\build\pyinstaller_work `
            --noconfirm
        shell: pwsh

      # ── 10. Verify .exe ───────────────────────────────────────────
      - name: Verify AudioStream.exe
        run: |
          if (-not (Test-Path "dist\AudioStream.exe")) {
            Write-Error "AudioStream.exe not found"
            exit 1
          }
          $size = (Get-Item "dist\AudioStream.exe").Length / 1MB
          Write-Host ("AudioStream.exe: {0:N1} MB" -f $size)
        shell: pwsh

      # ── 11. Upload artifact ───────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AudioStream-Windows-x64
          path: dist/AudioStream.exe
          retention-days: 30

      # ── 12. Attach to GitHub Release ─────────────────────────────
      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/AudioStream.exe
          name: "AudioStream ${{ github.ref_name }}"
          body: |
            ## AudioStream ${{ github.ref_name }}

            ### Downloads
            | Platform | File | Notes |
            |----------|------|-------|
            | 🪟 Windows 10/11 (x64) | `AudioStream.exe` | Double-click to run — no install needed |
            | 🐧 Linux (x64) | `AudioStream` | `chmod +x AudioStream && ./AudioStream` |
            | 📱 Android 8.0+ | `app-release.apk` | Enable "Install unknown apps" first |

            > **Windows SmartScreen**: Click **More info → Run anyway** if prompted.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
